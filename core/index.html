<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gadgets — raphaelsimon.fr</title>
<style>
  :root{--bg:#111;--bg-bar:#0d0d0d;--card:#161616;--line:#2a2a2a;
    --ink:#e0e0e0;--ink-dim:#8a8a8a;--gold:#eec35e;--gold-dim:#c9a030;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--gold);text-decoration:none}
  .topbar{display:flex;justify-content:space-between;align-items:center;
    padding:.6rem 1.25rem;border-bottom:1px solid var(--line);background:var(--bg-bar);font-size:.85rem}
  .topbar a:hover{color:var(--gold-dim)}
  .topbar .here{color:var(--ink-dim)}
  header{padding:2.5rem 1.25rem 1rem;max-width:1000px;margin:0 auto}
  h1{margin:0 0 .35rem;font-size:1.95rem;letter-spacing:.01em}
  h1 .dot{color:var(--gold)}
  .sub{color:var(--ink-dim);margin:0;font-size:.98rem;line-height:1.5;max-width:60ch}
  main{max-width:1000px;margin:0 auto;padding:1.25rem 1.25rem 3rem}
  ul.grid{list-style:none;margin:0;padding:0;display:grid;gap:1rem;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .card{display:block;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:1.15rem 1.25rem;color:inherit;
    transition:border-color .15s ease,transform .15s ease}
  .card:hover{border-color:var(--gold);transform:translateY(-2px)}
  .card h2{margin:0 0 .4rem;font-size:1.12rem;color:var(--ink)}
  .card p{margin:0;color:var(--ink-dim);font-size:.9rem;line-height:1.45}
  .card .arrow{color:var(--gold);font-size:.85rem;margin-top:.75rem;display:inline-block}
  footer{max-width:1000px;margin:0 auto;padding:0 1.25rem 2.5rem;color:var(--ink-dim);font-size:.78rem}
  footer a{color:var(--ink-dim);border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--gold)}
</style>
</head>
<body>
  <div class="topbar">
    <a href="https://raphaelsimon.fr/">&larr; raphaelsimon.fr</a>
    <span class="here">gadgets</span>
  </div>
  <header>
    <h1>Gadgets<span class="dot">.</span></h1>
    <p class="sub">Petits outils et pages statiques, bricolés au fil de l'eau et rangés ici.</p>
  </header>
  <main>
    <ul class="grid">
__CARDS__
    </ul>
  </main>
  <footer>Généré automatiquement le __GENERATED__ · <a href="https://raphaelsimon.fr/">raphaelsimon.fr</a></footer>
</body>
</html>
